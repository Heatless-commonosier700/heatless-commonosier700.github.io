name: Pages Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Process
        env:
          AD90CD: ${{ secrets.AD90CD }}
          B5CC72: ${{ secrets.B5CC72 }}
        run: |
          python3 -c "
          import sys, os, pathlib
          pairs = [('AD90CD', '<!-- 1f2cde764248f15ac5968540436a0a443c -->'), ('B5CC72', '<!--  -->')]
          path = pathlib.Path('index.html')
          data = path.read_text(encoding='utf-8')
          result = data
          for key, mark in pairs:
              token = os.environ.get(key, '')
              if token:
                  result = result.replace(mark, token)
          if result == data and any(os.environ.get(k, '') for k, _ in pairs):
              sys.exit(1)
          if result != data:
              path.write_text(result, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4

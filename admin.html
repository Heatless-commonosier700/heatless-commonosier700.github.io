<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Admin Panel</h1>

<div id="loginPanel">

    <input
        type="email"
        id="email"
        placeholder="Email">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button id="loginBtn">
        Login
    </button>

</div>

<div id="adminPanel" style="display:none;">

    <h2>Edit Player</h2>

    <select id="playerSelect"></select>

    <br><br>

    <input
        type="number"
        id="points"
        placeholder="Points">

    <button id="saveBtn">
        Save
    </button>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>

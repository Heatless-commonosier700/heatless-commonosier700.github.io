<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Admin Panel</h1>

<input
    type="email"
    id="email"
    placeholder="Email">

<input
    type="password"
    id="password"
    placeholder="Password">

<button id="loginBtn">
    Login
</button>

<hr>

<select id="playerSelect"></select>

<input
    type="number"
    id="points"
    placeholder="Points">

<button id="saveBtn">
    Save
</button>

<script type="module" src="admin.js"></script>

</body>
</html>
